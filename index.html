<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>BlinkBuy Emergency — Immediate Help Across Malawi</title>
    <meta name="description" content="Get immediate emergency help across Malawi. Connect with available workers 24/7 for plumbing, electrical, medical transport, security, and more." />
    <meta name="theme-color" content="#dc2626" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BB Emergency" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="BlinkBuy Emergency" />
    <meta property="og:description" content="Immediate emergency help across Malawi — 24/7" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet" />

    <style>
      html, body { overscroll-behavior: none; background: #0a1628; }
      #root { min-height: 100dvh; }
      body { opacity: 0; transition: opacity 0.15s; }
      body.loaded { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => document.body.classList.add('loaded'));
      });
    </script>
  </body>
</html>
